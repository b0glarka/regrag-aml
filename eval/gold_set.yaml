- id: q035
  question: Does FATF specify a €10,000 cash reporting threshold?
  type: refutation
  difficulty: medium
  recommendation: R.10
  category: numeric_trap
  expected_pages: [14]
  reference_answer: >
    No. FATF does not set a €10,000 threshold. For occasional transactions it specifies a
    designated threshold of USD/EUR 15,000; cross-border cash reporting thresholds are set
    by individual countries.
  notes: Cash reporting misconception (the designated threshold is 15,000, not 10,000)